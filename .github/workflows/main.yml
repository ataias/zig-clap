name: CI
on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"

jobs:
  test:
    strategy:
      matrix:
        optimize: [Debug, ReleaseSmall, ReleaseSafe, ReleaseFast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          cache-key: ${{ matrix.optimize }}
      - run: zig test clap.zig -O${{ matrix.optimize }}
  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
      - run: zig build examples
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
      - run: zig fmt --check .
  coverage:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
      # kcov uses ptrace and calls personality() to disable ASLR before
      # instrumenting a binary. GitHub Actions uses a custom seccomp profile
      # stricter than Docker's default; SYS_PTRACE alone is not sufficient to
      # unblock personality(). seccomp=unconfined is required.
      # This is acceptable because GitHub-hosted runners are ephemeral
      # single-tenant VMs that are destroyed after the job completes.
      options: --cap-add SYS_PTRACE --security-opt seccomp=unconfined
    env:
      COVERAGE_THRESHOLD: "100"
    steps:
      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            kcov git curl xz-utils ca-certificates
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
      - name: Build test binary
        # -fllvm: Zig's self-hosted x86 backend (default for Debug on amd64)
        # emits DWARF that kcov cannot parse, resulting in 0% coverage.
        # Force the LLVM backend so kcov gets usable debug info.
        # Tested 2026-03-01 with zig 0.16.0-dev.2261+d6b3dd25a and kcov 43.
        run: |
          mkdir -p zig-out/bin
          zig test clap.zig --test-no-exec -femit-bin=zig-out/bin/clap-tests -fllvm
      - name: Run kcov
        run: |
          mkdir -p zig-out/coverage
          kcov --clean \
               --include-pattern=clap \
               zig-out/coverage \
               zig-out/bin/clap-tests
      - name: Check coverage threshold
        run: python3 scripts/check_coverage.py zig-out/coverage/clap-tests/cobertura.xml "$COVERAGE_THRESHOLD"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: zig-out/coverage/
